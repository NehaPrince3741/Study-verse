    /* ─── SCHEDULE DATA ─── */

    const WEEK_FULL = ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];
    const MON_WED = [
      { name:"DSTL",               icon:"dstl",  tag:"Mathematics",        color:"#ff2d78" },
      { name:"Digital Electronics", icon:"de",   tag:"Core Subject",        color:"#ff6eb4" },
      { name:"Human Values",        icon:"hv",   tag:"Value Education",     color:"#39ff14" },
      { name:"Web Development",     icon:"web",  tag:"Dev Skills",          color:"#00f5ff" },
    ];
    const THU_SAT = [
      { name:"DS",             icon:"ds",    tag:"Data Structures",      color:"#00f5ff" },
      { name:"COA",            icon:"coa",   tag:"Computer Organization", color:"#00bfff" },
      { name:"Cyber Security", icon:"cyber", tag:"Security",             color:"#bf00ff" },
      { name:"Technical Era",  icon:"tech",  tag:"Dev Lectures",         color:"#ffe600" },
    ];
    const SCHEDULE = { MON:MON_WED, TUE:MON_WED, WED:MON_WED, THU:THU_SAT, FRI:THU_SAT, SAT:THU_SAT, SUN:[] };

    /* ─── STORAGE HELPERS ─── */
    function weekKey() {
      const d = new Date(), jan1 = new Date(d.getFullYear(),0,1);
      return `${d.getFullYear()}_w${Math.ceil(((d-jan1)/86400000+jan1.getDay()+1)/7)}`;
    }
    function ck(dayIdx) { return `sh_sched_${dayIdx}_${weekKey()}`; }
    function getChecked(dayIdx) { try { return JSON.parse(localStorage.getItem(ck(dayIdx))) || []; } catch { return []; } }
    function setChecked(dayIdx, arr) { localStorage.setItem(ck(dayIdx), JSON.stringify(arr)); }
    function getPct(dayIdx) {
      if (dayIdx === 6) return 100;
      const subs = SCHEDULE[WEEK_DAYS[dayIdx]];
      if (!subs.length) return 0;
      return Math.round((getChecked(dayIdx).length / subs.length) * 100);
    }

    /* ─── SUBJECTS ─── */

      { id:"dstl",  name:"DSTL",               icon:"dstl",  units:[null,null,null,null,null] },

      { id:"hv",   name:"Human Values",         icon:"hv",    units:["https://youtu.be/HDXIsoYVclI?si=xb71cWZ1fDqDGlvx","https://youtu.be/zcUSYXDbEsg?si=bC9C-8DQwSTInpRd","https://youtu.be/ND4fxJtyp38?si=RTbZLiu3HwvS3UgX","https://youtu.be/vE71rOGj5I8?si=yEVoD-JEJ_H8Prdb","https://youtu.be/Q3PorTRYbQE?si=zOeYEp1BhOhEEvzs"] },

    /* ─── REUSABLE COMPONENTS ─── */
    function GlowBg({ t }) {
      return (
        <div style={{ position:"fixed", inset:0, zIndex:0, background:t.bg, overflow:"hidden", pointerEvents:"none" }}>
          <div style={{ position:"absolute", top:"-15%", right:"-10%", width:420, height:420, borderRadius:"50%", background:`radial-gradient(circle, ${t.primary}16 0%, transparent 70%)`, animation:"blob1 9s ease-in-out infinite alternate" }} />
          <div style={{ position:"absolute", bottom:"5%", left:"-12%", width:360, height:360, borderRadius:"50%", background:`radial-gradient(circle, ${t.primary}10 0%, transparent 70%)`, animation:"blob2 11s ease-in-out infinite alternate" }} />
          <svg style={{ position:"absolute", inset:0, width:"100%", height:"100%", opacity:0.3 }} viewBox="0 0 400 800">
            <defs><filter id="gf"><feGaussianBlur stdDeviation="1.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
            <path d="M-40 180 Q130 80 280 250 T480 420" stroke={t.primary} strokeWidth="1.3" fill="none" filter="url(#gf)"/>
            <path d="M-40 320 Q90 180 340 360 T580 560" stroke={t.primary} strokeWidth="0.8" fill="none"/>
            <path d="M310 -40 Q210 190 390 380 T340 800" stroke={t.secondary} strokeWidth="0.9" fill="none" filter="url(#gf)"/>

            <circle cx="375" cy="55" r="1.5" fill={t.secondary} opacity="0.6"/>
            <circle cx="18" cy="410" r="1.5" fill={t.primary} opacity="0.4"/>
          </svg>
          <style>{`@keyframes blob1{from{transform:translate(0,0)}to{transform:translate(-35px,55px)}}@keyframes blob2{from{transform:translate(0,0)}to{transform:translate(45px,-35px)}}`}</style>
        </div>
      );
    }

    function BackBtn({ t, onClick, label = "Back" }) {
      return (
        <button onClick={onClick} style={{ display:"flex", alignItems:"center", gap:6, background:"none", border:`1px solid ${t.border}`, color:t.primary, borderRadius:10, padding:"7px 14px", cursor:"pointer", fontSize:14, marginBottom:18, fontWeight:600 }}>
          <NeonIcon type="back" color={t.primary} size={16} /> {label}
        </button>
      );
    }

    function SectionTitle({ t, icon, label }) {
      return (
        <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:16 }}>
          <NeonIcon type={icon} color={t.primary} size={22} />
          <span style={{ fontSize:19, fontWeight:800, color:t.text, letterSpacing:0.5 }}>{label}</span>
          <div style={{ flex:1, height:1, background:`linear-gradient(to right, ${t.primary}60, transparent)`, boxShadow:`0 0 6px ${t.primary}` }} />
        </div>
      );
    }

    function HomeCard({ t, iconType, iconColor, title, desc, onClick }) {
      const [hover, setHover] = useState(false);
      return (
        <div onClick={onClick}
          onMouseEnter={() => setHover(true)} onMouseLeave={() => setHover(false)}
          style={{ background:t.card, border:`1px solid ${hover ? t.primary : t.border}`, borderRadius:16, padding:"18px 14px", cursor:"pointer", position:"relative", overflow:"hidden",
            boxShadow: hover ? `0 0 28px ${t.primary}35` : `0 0 14px ${t.glow}`,
            transition:"all 0.2s" }}>
          <div style={{ marginBottom:10 }}><NeonIcon type={iconType} color={iconColor || t.primary} size={30} /></div>
          <div style={{ fontWeight:700, fontSize:16, color:t.text, marginBottom:3 }}>{title}</div>
          <div style={{ fontSize:12, color:t.sub, lineHeight:1.4 }}>{desc}</div>
          <div style={{ position:"absolute", right:12, bottom:14 }}><NeonIcon type="arrow" color={t.primary} size={16} /></div>
        </div>
      );
    }

    function OptionBtn({ t, iconType, iconColor, label, onClick, disabled }) {
      return (
        <button onClick={disabled ? undefined : onClick} style={{
          display:"flex", width:"100%", alignItems:"center", gap:12,
          background:t.card, border:`1px solid ${disabled ? t.border+"55" : t.border}`,
          color: disabled ? t.sub+"88" : t.text, borderRadius:14, padding:"13px 16px",
          cursor: disabled ? "default" : "pointer", fontWeight:600, fontSize:15, marginBottom:11,
          boxShadow:`0 0 10px ${t.glow}`, textAlign:"left", opacity: disabled ? 0.5 : 1,
        }}>
          {iconType && <NeonIcon type={iconType} color={disabled ? "#555" : (iconColor || t.primary)} size={22} />}
          <span style={{ flex:1 }}>{label}</span>
          {!disabled && <NeonIcon type="arrow" color={t.primary} size={16} />}
        </button>
      );
    }

    function UnitBtn({ t, label, url }) {
      return (
        <a href={url || "#"} target={url ? "_blank" : "_self"} rel="noopener noreferrer"
          style={{ display:"flex", alignItems:"center", justifyContent:"space-between",
            background:t.card, border:`1px solid ${url ? t.border : t.border+"44"}`,
            color: url ? t.primary : "#555", borderRadius:12, padding:"12px 16px",
            textDecoration:"none", fontWeight:600, fontSize:15, marginBottom:9,
            boxShadow:`0 0 8px ${t.glow}`, opacity: url ? 1 : 0.45 }}>
          <span>{label}</span>
          {url ? <NeonIcon type="arrow" color={t.primary} size={16}/> : <NeonIcon type="lock" color="#555" size={16}/>}
        </a>
      );
    }

    function ComingSoon({ t, onBack }) {
      return (
        <div style={{ textAlign:"center", padding:"60px 20px" }}>
          <NeonIcon type="lock" color={t.primary} size={48} />
          <div style={{ fontSize:22, fontWeight:800, color:t.primary, marginTop:16, marginBottom:8, textShadow:`0 0 14px ${t.primary}` }}>Coming Soon!</div>
          <div style={{ color:t.sub, marginBottom:30 }}>This feature is under development.</div>
          <BackBtn t={t} onClick={onBack} />
        </div>
      );

    /* ─── SCHEDULE SCREEN ─── */
    function ScheduleScreen({ t, onBack }) {
      const jsDay = new Date().getDay();
      const todayIdx = jsDay === 0 ? 6 : jsDay - 1;
      const [activeDay, setActiveDay] = useState(todayIdx);
      const [tick, setTick] = useState(0);

      function toggle(dayIdx, subIdx) {
        const cur = getChecked(dayIdx);
        const pos = cur.indexOf(subIdx);
        if (pos === -1) cur.push(subIdx); else cur.splice(pos, 1);
        setChecked(dayIdx, cur);
        setTick(v => v + 1);
      }

      const checked = getChecked(activeDay);

            <SectionTitle t={t} icon="cal" label="Weekly Schedule" />

            <div style={{ flex:1, height:1, background:`linear-gradient(to right, ${activeDay===6?"#00f5ff":t.primary}60, transparent)` }} />

          {activeDay === 6 ? (

              <NeonIcon type="moon" color="#00f5ff" size={52} />

              <div style={{ color:"#00f5ffaa", fontSize:14 }}>Rest, recharge & reflect ✨</div>

          ) : (
            <div>
              {subs.map((sub, i) => {
                const isDone = checked.includes(i);
                return (
                  <div key={i} style={{
                    background: t.card, border:`1px solid ${isDone ? sub.color+"55" : t.border}`,
                    borderRadius:14, padding:"13px 14px", marginBottom:10,
                    display:"flex", alignItems:"center", gap:12, position:"relative", overflow:"hidden",
                    boxShadow: isDone ? `0 0 14px ${sub.color}22` : `0 0 8px ${t.glow}`,
                    transition:"all 0.2s", opacity: isDone ? 0.65 : 1,
                  }}>
                    <div style={{ position:"absolute", left:0, top:0, bottom:0, width:3, background:sub.color, boxShadow:`0 0 8px ${sub.color}`, borderRadius:"3px 0 0 3px" }} />
                    <div onClick={() => toggle(activeDay, i)} style={{
                      width:28, height:28, borderRadius:8, border:`2px solid ${sub.color}`,
                      display:"flex", alignItems:"center", justifyContent:"center",
                      background: isDone ? sub.color : "transparent", cursor:"pointer", flexShrink:0,
                      boxShadow: isDone ? `0 0 14px ${sub.color}, 0 0 26px ${sub.color}55` : `0 0 6px ${sub.color}55`,
                      transition:"all 0.2s"
                    }}>
                      {isDone && <NeonIcon type="check" color="#fff" size={16} />}
                    </div>
                    <NeonIcon type={sub.icon} color={sub.color} size={26} />
                    <div style={{ flex:1 }}>
                      <div style={{ fontWeight:700, fontSize:16, color: isDone ? "#888" : t.text, textDecoration: isDone ? "line-through" : "none" }}>{sub.name}</div>
                      <div style={{ fontSize:11, color:sub.color, textShadow:`0 0 6px ${sub.color}`, letterSpacing:1, textTransform:"uppercase", marginTop:2 }}>{sub.tag}</div>
                    </div>
                  </div>
                );
              })}
            </div>
          )}

          {/* Performance Chart */}
          <div style={{ background:t.card, border:`1px solid ${t.border}`, borderRadius:18, padding:"18px 14px", marginTop:24, boxShadow:`0 0 16px ${t.glow}` }}>
            <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:16 }}>
              <NeonIcon type="chart" color={t.primary} size={20} />
              <span style={{ fontWeight:800, fontSize:14, color:t.primary, textShadow:`0 0 8px ${t.primary}`, letterSpacing:1.5, textTransform:"uppercase" }}>Performance Chart</span>
            </div>

            {todayIdx !== 6 && (
              <div style={{ background:`${t.bg}88`, border:`1px solid ${t.border}`, borderRadius:12, padding:"12px 14px", marginBottom:16 }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8 }}>
                  <span style={{ fontSize:12, color:t.sub, textTransform:"uppercase", letterSpacing:1 }}>Today's Progress</span>
                  <span style={{ fontWeight:800, fontSize:18, color:"#39ff14", textShadow:"0 0 10px #39ff14" }}>{todayPct}%</span>
                </div>
                <div style={{ height:10, background:"#1a0030", borderRadius:10, overflow:"hidden" }}>
                  <div style={{ height:"100%", width:`${todayPct}%`, borderRadius:10, background:`linear-gradient(90deg, ${t.primary}, #00f5ff)`, boxShadow:`0 0 10px ${t.primary}, 0 0 20px #00f5ff55`, transition:"width 0.6s ease" }} />
                </div>
              </div>
            )}

            <div style={{ display:"flex", alignItems:"flex-end", gap:8, height:110, padding:"0 4px" }}>
              {WEEK_DAYS.map((d, i) => {
                const pct = getPct(i);
                const isSun = i === 6;
                const col = isSun ? "#00f5ff" : (i < 3 ? t.primary : "#00bfff");
                const barH = Math.max(4, Math.round((pct / 100) * 80));
                const isT = i === todayIdx;
                return (
                  <div key={d} style={{ flex:1, display:"flex", flexDirection:"column", alignItems:"center", gap:4, height:"100%" }}>
                    <div style={{ fontSize:9, fontWeight:700, color: pct===100 ? "#39ff14" : "#777", letterSpacing:0.5 }}>
                      {isSun ? "🌙" : pct + "%"}
                    </div>
                    <div style={{ flex:1, width:"100%", display:"flex", alignItems:"flex-end", justifyContent:"center" }}>
                      <div style={{ width:"100%", maxWidth:30, height:barH, borderRadius:"6px 6px 0 0",
                        background:`linear-gradient(to top, ${col}, ${col}44)`,
                        boxShadow:`0 0 10px ${col}88`, transition:"height 0.5s ease" }} />
                    </div>
                    <div style={{ fontSize:9, fontWeight:700, color: isT ? t.primary : "#555", textShadow: isT ? `0 0 6px ${t.primary}` : "none", letterSpacing:0.5, textTransform:"uppercase" }}>{d}</div>
                  </div>
                );
              })}
            </div>

            <div style={{ display:"flex", gap:8, flexWrap:"wrap", marginTop:14 }}>
              {(() => {
                let streak = 0;
                for (let i = 0; i < 6; i++) { if (getPct(i) === 100) streak++; else if (i < todayIdx) streak = 0; }
                const total = Array.from({length:6},(_,i)=>getPct(i)).filter(p=>p===100).length;
                return [
                  <div key="s" style={{ background:`#39ff1412`, border:`1px solid #39ff1440`, borderRadius:20, padding:"5px 12px", fontSize:12, color:"#39ff14", fontWeight:700, textShadow:"0 0 6px #39ff14" }}>🔥 {streak} Day Streak</div>,
                  <div key="t" style={{ background:`${t.primary}12`, border:`1px solid ${t.border}`, borderRadius:20, padding:"5px 12px", fontSize:12, color:t.primary, fontWeight:700 }}>✅ {total}/6 Days Done</div>,
                ];
              })()}
            </div>
          </div>
        </div>
      );
    }

    /* ─── LOVE DIARY SCREEN ─── */
    function LoveDiaryScreen({ t, userName, onBack }) {
      const storageKey = `love_diary_${userName}`;
      const [entries, setEntries] = useState(() => {
        try { return JSON.parse(localStorage.getItem(storageKey)) || []; } catch { return []; }
      });
      const [writing, setWriting] = useState(false);
      const [text, setText] = useState("");
      const [title, setTitle] = useState("");
      const [viewEntry, setViewEntry] = useState(null);

      function saveEntry() {
        if (!text.trim()) return;
        const now = new Date();
        const dateStr = now.toLocaleDateString("en-IN", { day:"numeric", month:"long", year:"numeric" });
        const timeStr = now.toLocaleTimeString("en-IN", { hour:"2-digit", minute:"2-digit" });
        const newEntry = { id: Date.now(), title: title.trim() || "A Beautiful Memory", date: dateStr, time: timeStr, text: text.trim() };
        const updated = [newEntry, ...entries];
        localStorage.setItem(storageKey, JSON.stringify(updated));
        setEntries(updated);
        setText(""); setTitle(""); setWriting(false);
      }

      function deleteEntry(id) {
        const updated = entries.filter(e => e.id !== id);
        localStorage.setItem(storageKey, JSON.stringify(updated));
        setEntries(updated);
        setViewEntry(null);
      }

      const heartColor = userName === "neha" ? "#ff2d78" : "#2d8fff";

      // View single entry
      if (viewEntry) {
        return (
          <div style={{ padding:"20px 16px" }}>
            <BackBtn t={t} onClick={() => setViewEntry(null)} label="All Memories" />
            <div style={{ background:t.card, border:`1px solid ${t.border}`, borderRadius:18, padding:"20px 18px", boxShadow:`0 0 18px ${t.glow}` }}>
              <div style={{ fontSize:22, fontWeight:800, color:t.primary, marginBottom:6, textShadow:`0 0 10px ${t.primary}88` }}>{viewEntry.title}</div>
              <div style={{ fontSize:12, color:t.sub, marginBottom:18, letterSpacing:0.5 }}>{viewEntry.date} · {viewEntry.time}</div>
              <div style={{ color:t.text, fontSize:15, lineHeight:1.8, whiteSpace:"pre-wrap" }}>{viewEntry.text}</div>
            </div>
            <button onClick={() => deleteEntry(viewEntry.id)} style={{ marginTop:18, width:"100%", background:"none", border:"1px solid #ff4444", color:"#ff4444", borderRadius:12, padding:11, cursor:"pointer", fontWeight:600, fontSize:14 }}>🗑️ Delete this memory</button>
          </div>
        );
      }

      // Write new entry
      if (writing) {
        return (
          <div style={{ padding:"20px 16px" }}>
            <BackBtn t={t} onClick={() => { setWriting(false); setText(""); setTitle(""); }} />
            <SectionTitle t={t} icon="hv" label="Write a Memory" />
            <input
              value={title}
              onChange={e => setTitle(e.target.value)}
              placeholder="Give it a title... 💭"
              style={{ width:"100%", background:t.card, border:`1px solid ${t.border}`, color:t.text, borderRadius:12, padding:"12px 14px", fontSize:15, fontWeight:600, marginBottom:12, outline:"none", fontFamily:"'Segoe UI', sans-serif", boxShadow:`0 0 8px ${t.glow}` }}
            />
            <textarea
              value={text}
              onChange={e => setText(e.target.value)}
              placeholder="Write your beautiful memory here... How was your day? What made you smile? 🌸"
              rows={10}
              style={{ width:"100%", background:t.card, border:`1px solid ${t.border}`, color:t.text, borderRadius:12, padding:"12px 14px", fontSize:14, lineHeight:1.8, resize:"none", outline:"none", fontFamily:"'Segoe UI', sans-serif", boxShadow:`0 0 8px ${t.glow}` }}
            />
            <button onClick={saveEntry} style={{ marginTop:14, width:"100%", background:`linear-gradient(135deg, ${t.primary}, ${t.secondary})`, border:"none", color:"#fff", borderRadius:14, padding:"14px", cursor:"pointer", fontSize:16, fontWeight:800, boxShadow:`0 0 18px ${t.primary}55`, letterSpacing:0.5 }}>
              💾 Save Memory
            </button>
          </div>
        );
      }

      // Main diary list
      return (
        <div style={{ padding:"20px 16px" }}>
          <BackBtn t={t} onClick={onBack} />
          <SectionTitle t={t} icon="hv" label="Love Diary" />

          {/* Write button */}
          <button onClick={() => setWriting(true)} style={{ width:"100%", background:`linear-gradient(135deg, ${t.primary}22, ${t.card})`, border:`1.5px dashed ${t.primary}`, color:t.primary, borderRadius:16, padding:"16px", cursor:"pointer", fontSize:15, fontWeight:700, marginBottom:20, boxShadow:`0 0 12px ${t.primary}22`, textShadow:`0 0 8px ${t.primary}88`, display:"flex", alignItems:"center", justifyContent:"center", gap:10 }}>
            <span style={{ fontSize:22 }}>✍️</span> Write Today's Memory
          </button>

          {entries.length === 0 ? (
            <div style={{ textAlign:"center", padding:"50px 20px", color:t.sub }}>
              <div style={{ fontSize:48, marginBottom:14 }}>💝</div>
              <div style={{ fontSize:16, fontWeight:700, color:t.primary, marginBottom:8 }}>No memories yet</div>
              <div style={{ fontSize:13 }}>Start writing your beautiful moments!</div>
            </div>
          ) : (
            entries.map(e => (
              <div key={e.id} onClick={() => setViewEntry(e)} style={{
                background:t.card, border:`1px solid ${t.border}`, borderRadius:16,
                padding:"14px 16px", marginBottom:12, cursor:"pointer",
                boxShadow:`0 0 10px ${t.glow}`, transition:"all 0.2s",
                position:"relative", overflow:"hidden"
              }}>
                <div style={{ position:"absolute", left:0, top:0, bottom:0, width:3, background:heartColor, boxShadow:`0 0 8px ${heartColor}`, borderRadius:"3px 0 0 3px" }} />
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start" }}>
                  <div style={{ fontWeight:700, fontSize:15, color:t.text, marginBottom:4, flex:1, paddingRight:8 }}>{e.title}</div>
                  <NeonIcon type="arrow" color={t.primary} size={16} />
                </div>
                <div style={{ fontSize:11, color:t.sub, letterSpacing:0.5 }}>{e.date} · {e.time}</div>
                <div style={{ fontSize:13, color:t.sub, marginTop:6, lineHeight:1.5, overflow:"hidden", display:"-webkit-box", WebkitLineClamp:2, WebkitBoxOrient:"vertical" }}>{e.text}</div>
              </div>
            ))
          )}
        </div>
      );
    }

    /* ─── ACHIEVEMENTS SCREEN ─── */
    function AchievementsScreen({ t, onBack }) {
      const goals = [
        { date:"7 June",   reward:"Mystery Reward",            emoji:"🎁" },
        { date:"14 June",  reward:"Ice Cream",                 emoji:"🍦" },
        { date:"21 June",  reward:"Dosa & Veg Noodles + Mojito", emoji:"🥤" },
        { date:"28 June",  reward:"BlackForest Cake 500g",     emoji:"🎂" },
        { date:"5 July",   reward:"Cadbury Chocolate Box",     emoji:"🍫" },
        { date:"12 July",  reward:"Dark Fantasy Doracake",     emoji:"🍩" },
      ];

      const [achieved, setAchieved] = useState(() => {
        try { return JSON.parse(localStorage.getItem("neha_achievements")) || []; } catch { return []; }
      });

      function toggleAchieve(i) {
        const cur = [...achieved];
        const pos = cur.indexOf(i);
        if (pos === -1) cur.push(i); else cur.splice(pos, 1);
        localStorage.setItem("neha_achievements", JSON.stringify(cur));
        setAchieved(cur);
      }

      const doneCount = achieved.length;

      return (
        <div style={{ padding:"20px 16px" }}>
          <BackBtn t={t} onClick={onBack} />
          <SectionTitle t={t} icon="trophy" label="Achievements" />

          {/* Progress banner */}
          <div style={{ background:t.card, border:`1px solid ${t.border}`, borderRadius:16, padding:"14px 18px", marginBottom:20, boxShadow:`0 0 16px ${t.glow}`, display:"flex", alignItems:"center", justifyContent:"space-between" }}>
            <div>
              <div style={{ color:t.sub, fontSize:12, letterSpacing:1, textTransform:"uppercase", marginBottom:4 }}>Goals Achieved</div>
              <div style={{ fontSize:26, fontWeight:900, color:t.primary, textShadow:`0 0 14px ${t.primary}` }}>{doneCount} / {goals.length}</div>
            </div>
            <div style={{ fontSize:36 }}>{doneCount === goals.length ? "🏆" : "⭐"}</div>
          </div>

          {/* Goal cards */}
          {goals.map((g, i) => {
            const isDone = achieved.includes(i);
            return (
              <div key={i} style={{
                background: isDone ? `${t.primary}14` : t.card,
                border:`1.5px solid ${isDone ? t.primary : t.border}`,
                borderRadius:16, padding:"14px 16px", marginBottom:12,
                display:"flex", alignItems:"center", gap:14,
                boxShadow: isDone ? `0 0 18px ${t.primary}30` : `0 0 8px ${t.glow}`,
                transition:"all 0.3s", opacity: isDone ? 0.75 : 1,
                position:"relative", overflow:"hidden"
              }}>
                <div style={{ position:"absolute", left:0, top:0, bottom:0, width:3, background: isDone ? t.primary : t.border, boxShadow: isDone ? `0 0 8px ${t.primary}` : "none", borderRadius:"3px 0 0 3px", transition:"all 0.3s" }} />
                <div style={{ fontSize:28, flexShrink:0 }}>{g.emoji}</div>
                <div style={{ flex:1 }}>
                  <div style={{ fontSize:12, color:t.sub, letterSpacing:1, textTransform:"uppercase", marginBottom:3 }}>{g.date}</div>
                  <div style={{ fontSize:15, fontWeight:700, color: isDone ? "#aaa" : t.text, textDecoration: isDone ? "line-through" : "none" }}>{g.reward}</div>
                </div>
                <div onClick={() => toggleAchieve(i)} style={{
                  width:32, height:32, borderRadius:10, border:`2px solid ${isDone ? t.primary : "#555"}`,
                  display:"flex", alignItems:"center", justifyContent:"center",
                  background: isDone ? t.primary : "transparent", cursor:"pointer", flexShrink:0,
                  boxShadow: isDone ? `0 0 14px ${t.primary}, 0 0 28px ${t.primary}55` : "none",
                  transition:"all 0.25s"
                }}>
                  {isDone && <NeonIcon type="check" color="#fff" size={18} />}
                </div>
              </div>
            );
          })}

          {doneCount === goals.length && (
            <div style={{ textAlign:"center", marginTop:10, padding:"18px", background:`${t.primary}10`, border:`1px solid ${t.primary}40`, borderRadius:16 }}>
              <div style={{ fontSize:32 }}>🏆</div>
              <div style={{ color:t.primary, fontWeight:800, fontSize:16, marginTop:8, textShadow:`0 0 10px ${t.primary}` }}>All Goals Achieved! Amazing Neha! 💕</div>
            </div>
          )}
        </div>
      );
    }

          return <AchievementsScreen t={t} onBack={() => go("home")} />;
        }
        if (screen === "lovediary")    return <LoveDiaryScreen t={t} userName={user} onBack={() => go("home")} />;

        if (screen === "notes") {
          const noteSubjects = [
            { name:"DSTL",          icon:"dstl",  color:"#ff2d78", url:"https://drive.google.com/drive/folders/12mtaxsjQ_kaF8rIsx6FJ_Y-WQtBoShwv" },
            { name:"Human Values",  icon:"hv",    color:"#39ff14", url:"https://drive.google.com/drive/folders/1-S4q9vKH7hQPGor1oHNz0hcIQU0XZU7K" },
            { name:"DS",            icon:"ds",    color:"#00f5ff", url:"https://drive.google.com/drive/folders/1Czib8wuX_exB4rah00qpHlDQwcNAw1rg" },
            { name:"COA",           icon:"coa",   color:"#00bfff", url:"https://drive.google.com/drive/folders/16_J5DFLh3HPX_5WnBumsfpLjxG-aAsl8" },
            { name:"Cyber Security",icon:"cyber", color:"#bf00ff", url:"https://drive.google.com/drive/folders/14RPryqiD8ZNbCvGINCJL_u3mURIp9uxf" },
          ];
          return (
            <div style={{ padding:20 }}>
              <BackBtn t={t} onClick={() => go("home")} />
              <SectionTitle t={t} icon="notes" label="Notes" />
              {noteSubjects.map((sub) => (
                <a key={sub.name} href={sub.url} target="_blank" rel="noopener noreferrer"
                  style={{ display:"flex", alignItems:"center", gap:14,
                    background:t.card, border:`1px solid ${t.border}`,
                    borderRadius:14, padding:"14px 16px", marginBottom:11,
                    textDecoration:"none", boxShadow:`0 0 10px ${t.glow}`,
                    position:"relative", overflow:"hidden" }}>
                  <div style={{ position:"absolute", left:0, top:0, bottom:0, width:3, background:sub.color, boxShadow:`0 0 8px ${sub.color}`, borderRadius:"3px 0 0 3px" }} />
                  <NeonIcon type={sub.icon} color={sub.color} size={26} />
                  <span style={{ flex:1, fontWeight:700, fontSize:15, color:t.text }}>{sub.name}</span>
                  <span style={{ fontSize:12, color:sub.color, fontWeight:600, marginRight:6, textShadow:`0 0 6px ${sub.color}` }}>Drive</span>
                  <NeonIcon type="arrow" color={sub.color} size={16} />
                </a>
              ))}
            </div>
          );
        }

        if (screen === "syllabus") {
          window.open("https://fms.aktu.ac.in/Resources/aktu/pdf/syllabus/Syllabus2324/B.Tech_2nd_Yr_CSE_v3.pdf","_blank");
          go("home"); return null;
        }

        /* SUBJECTS */
        if (screen === "subjects") {
          if (!subScreen) return (
            <div style={{ padding:20 }}>
              <BackBtn t={t} onClick={() => go("home")} />
              <SectionTitle t={t} icon="book" label="Subjects" />
              <OptionBtn t={t} iconType="cal" iconColor={t.primary} label="Semester 3" onClick={() => setSubScreen("sem3")} />
              <OptionBtn t={t} iconType="lock" iconColor="#555" label="Semester 4" onClick={() => setSubScreen("sem4")} />
            </div>
          );
          if (subScreen === "sem4") return <ComingSoon t={t} onBack={() => setSubScreen(null)} />;
          return (
            <div style={{ padding:"0 14px 14px" }}>
              <div style={{ paddingTop:14, marginBottom:14 }}><BackBtn t={t} onClick={() => setSubScreen(null)} /></div>
              <SectionTitle t={t} icon="book" label="Semester 3" />
              {studySubjects.map(sub => (
                <div key={sub.id}>
                  <button onClick={() => { setExpandedSubject(expandedSubject===sub.id?null:sub.id); setCyberSub(null); }} style={{
                    display:"flex", width:"100%", alignItems:"center", gap:12,
                    background: expandedSubject===sub.id ? `${t.primary}18` : t.card,
                    border:`1px solid ${expandedSubject===sub.id ? t.primary : t.border}`,
                    color:t.text, borderRadius:14, padding:"13px 14px", cursor:"pointer",
                    fontWeight:700, fontSize:15, marginBottom:8, boxShadow:`0 0 8px ${t.glow}`,
                  }}>
                    <NeonIcon type={sub.icon} color={t.primary} size={22}/>
                    <span style={{ flex:1, textAlign:"left" }}>{sub.name}</span>
                    <span style={{ color:t.primary, fontSize:16 }}>{expandedSubject===sub.id?"▲":"▼"}</span>
                  </button>
                  {expandedSubject===sub.id && (
                    <div style={{ background:t.bg, borderRadius:12, padding:"10px 8px", marginBottom:10 }}>
                      {sub.isCyber ? (
                        cyberSub ? (
                          <div>
                            <BackBtn t={t} onClick={() => setCyberSub(null)} label="Cyber Security" />
                            <div style={{ fontWeight:700, color:t.primary, marginBottom:10 }}>{cyberSub==="gateway"?"🔐 Gateway":"📖 Semester Adda"}</div>
                            {(cyberSub==="gateway" ? sub.gateway : sub.semAdda).map((url,i)=>(<UnitBtn key={i} t={t} label={`Unit ${i+1}`} url={url}/>))}
                          </div>
                        ) : (
                          <div>
                            <OptionBtn t={t} iconType="cyber" iconColor="#bf00ff" label="Gateway" onClick={()=>setCyberSub("gateway")}/>
                            <OptionBtn t={t} iconType="book" iconColor={t.secondary} label="Semester Adda" onClick={()=>setCyberSub("semadda")}/>
                          </div>
                        )
                      ) : (sub.units||[]).map((url,i)=>(<UnitBtn key={i} t={t} label={`Unit ${i+1}`} url={url}/>))}
                    </div>
                  )}
                </div>
              ))}
            </div>
          );
        }

        /* DEVELOPER LECTURES */
        if (screen === "devlectures") {
          if (!subScreen) return (
            <div style={{ padding:20 }}>
              <BackBtn t={t} onClick={() => go("home")} />
              <SectionTitle t={t} icon="grad" label="Developer Lectures" />
              <OptionBtn t={t} iconType="code" iconColor="#00f5ff" label="Coding Verse" onClick={() => setSubScreen("codingverse")} />
              <OptionBtn t={t} iconType="tech" iconColor="#ffe600" label="Technical Era" onClick={() => setSubScreen("techera")} />
            </div>
          );
          const items = subScreen==="codingverse" ? codingVerse : technicalEra;
          const title = subScreen==="codingverse" ? "Coding Verse" : "Technical Era";
          const col = subScreen==="codingverse" ? "#00f5ff" : "#ffe600";
          return (
            <div style={{ padding:20 }}>
              <BackBtn t={t} onClick={() => setSubScreen(null)} />
              <SectionTitle t={t} icon={subScreen==="codingverse"?"code":"tech"} label={title} />
              {items.map((item,i) => (
                <a key={i} href={item.url} target="_blank" rel="noopener noreferrer" style={{ display:"flex", alignItems:"center", justifyContent:"space-between", background:t.card, border:`1px solid ${t.border}`, color:col, borderRadius:12, padding:"13px 16px", textDecoration:"none", fontWeight:600, fontSize:15, marginBottom:10, boxShadow:`0 0 8px ${t.glow}`, textShadow:`0 0 8px ${col}88` }}>
                  <span>{item.name}</span><NeonIcon type="arrow" color={col} size={16}/>
                </a>
              ))}
            </div>
          );
        }

        /* CODING OPTIONS */
        if (screen === "coding") {
          if (!subScreen) return (
            <div style={{ padding:20 }}>
              <BackBtn t={t} onClick={() => go("home")} />
              <SectionTitle t={t} icon="code" label="Coding Options" />
              <OptionBtn t={t} iconType="code" iconColor={t.primary} label="Generalise Coding" onClick={() => setSubScreen("general")} />
              <OptionBtn t={t} iconType="web" iconColor="#00f5ff" label="Frontend Developer" onClick={() => setSubScreen("frontend")} />
              <OptionBtn t={t} iconType="lock" iconColor="#555" label="Backend (4th Sem)" disabled />
              <OptionBtn t={t} iconType="lock" iconColor="#555" label="Database (5th Sem)" disabled />
            </div>
          );
          const items = subScreen==="general" ? generalCoding : frontendDev;
          const title = subScreen==="general" ? "Generalise Coding" : "Frontend Developer";
          return (
            <div style={{ padding:20 }}>
              <BackBtn t={t} onClick={() => setSubScreen(null)} />
              <SectionTitle t={t} icon="code" label={title} />
              {items.map((item,i) => (
                <a key={i} href={item.url} target="_blank" rel="noopener noreferrer" style={{ display:"flex", alignItems:"center", justifyContent:"space-between", background:t.card, border:`1px solid ${t.border}`, color:t.primary, borderRadius:12, padding:"13px 16px", textDecoration:"none", fontWeight:600, fontSize:15, marginBottom:10, boxShadow:`0 0 8px ${t.glow}` }}>
                  <span>{item.name}</span><NeonIcon type="arrow" color={t.primary} size={16}/>
                </a>
              ))}
            </div>
          );
        }

        /* HOME */
        return (
          <div style={{ padding:"20px 14px" }}>
            <div style={{ marginBottom:26 }}>
              <div style={{ color:t.sub, fontSize:15 }}>Welcome,</div>
              <div style={{ fontSize:34, fontWeight:900, color:t.primary, letterSpacing:-1, textShadow:`0 0 20px ${t.primary}88` }}>{profile.greeting}</div>
              <div style={{ color:t.sub, fontSize:13, marginTop:4 }}>Let's learn, grow and achieve together! ✦</div>
            </div>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:13, marginBottom:13 }}>
              <HomeCard t={t} iconType="book"     iconColor={t.primary}   title="Subjects"        desc="Explore study subjects"   onClick={() => go("subjects")} />
              <HomeCard t={t} iconType="notes"    iconColor={t.secondary} title="Notes"            desc="Access your study notes"  onClick={() => go("notes")} />
              <HomeCard t={t} iconType="grad"     iconColor="#00f5ff"     title="Dev Lectures"     desc="Learn dev skills"         onClick={() => go("devlectures")} />
              <HomeCard t={t} iconType="code"     iconColor="#ffe600"     title="Coding Options"   desc="Master coding skills"     onClick={() => go("coding")} />
              <HomeCard t={t} iconType="syllabus" iconColor="#bf00ff"     title="2nd Yr Syllabus"  desc="View full syllabus PDF"   onClick={() => go("syllabus")} />
              <HomeCard t={t} iconType="hv"       iconColor="#39ff14"     title="Love Diary"       desc="Write your day memories"  onClick={() => go("lovediary")} />
            </div>
            <div style={{ background:t.card, border:`1px solid ${t.border}`, borderRadius:14, padding:"13px 16px", display:"flex", alignItems:"center", justifyContent:"space-between", boxShadow:`0 0 10px ${t.glow}` }}>
              <span style={{ color:t.sub, fontSize:13 }}>✦ Small steps every day lead to big results.</span>
              <NeonIcon type="hv" color={t.primary} size={18}/>
            </div>
          </div>
        );
      }

      return (
        <div style={{ maxWidth:430, margin:"0 auto", minHeight:"100vh", fontFamily:"'Segoe UI', sans-serif", position:"relative", background:t.bg, color:t.text }}>
          <GlowBg t={t} />

          {/* MENU DRAWER */}
          {menuOpen && (
            <div style={{ position:"fixed", inset:0, zIndex:100, display:"flex" }}>
              <div onClick={() => setMenuOpen(false)} style={{ flex:1, background:"#00000085" }} />
              <div style={{ width:280, background:t.card, borderLeft:`1px solid ${t.border}`, padding:28, display:"flex", flexDirection:"column" }}>
                <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:6 }}>
                  <NeonIcon type="user" color={t.primary} size={22}/>
                  <span style={{ fontSize:20, fontWeight:800, color:t.primary, textShadow:`0 0 10px ${t.primary}` }}>About You</span>
                </div>
                <div style={{ color:t.sub, fontSize:13, marginBottom:22, letterSpacing:0.5 }}>Personal Section</div>
                {profile.showMenu && (
                  <div style={{ background:`${t.primary}12`, border:`1px solid ${t.primary}40`, borderRadius:16, padding:22, textAlign:"center", boxShadow:`0 0 18px ${t.primary}20` }}>
                    <NeonIcon type="hv" color={t.primary} size={40}/>
                    <div style={{ fontSize:21, fontWeight:800, color:t.primary, lineHeight:1.4, marginTop:12, textShadow:`0 0 14px ${t.primary}` }}>{profile.menuMsg}</div>
                  </div>
                )}
                <div style={{ marginTop:"auto" }}>
                  <button onClick={() => setMenuOpen(false)} style={{ width:"100%", background:"none", border:`1px solid ${t.border}`, color:t.sub, borderRadius:12, padding:11, cursor:"pointer", fontWeight:600 }}>Close</button>
                </div>
              </div>
            </div>
          )}

          {/* HEADER */}
          <div style={{ position:"sticky", top:0, zIndex:50, background:`${t.bg}ee`, backdropFilter:"blur(14px)", padding:"11px 18px", display:"flex", justifyContent:"space-between", alignItems:"center", borderBottom:`1px solid ${t.border}` }}>
            {profile.showMenu
              ? <button onClick={() => setMenuOpen(true)} style={{ background:"none", border:"none", cursor:"pointer", padding:2 }}><NeonIcon type="menu" color={t.primary} size={24}/></button>
              : <div style={{ width:28 }} />}
            <div style={{ fontWeight:900, fontSize:17, color:t.primary, letterSpacing:2, textShadow:`0 0 12px ${t.primary}88` }}>StudyHub</div>
            <button style={{ background:"none", border:"none", cursor:"pointer", padding:2 }}><NeonIcon type="bell" color={t.primary} size={22}/></button>
          </div>

          {/* CONTENT */}
          <div style={{ position:"relative", zIndex:1, paddingBottom:84 }}>
            {renderContent()}
          </div>

          {/* BOTTOM NAV */}
          <div style={{ position:"fixed", bottom:0, left:"50%", transform:"translateX(-50%)", width:"100%", maxWidth:430, background:`${t.bg}f2`, backdropFilter:"blur(14px)", borderTop:`1px solid ${t.border}`, display:"flex", justifyContent:"space-around", alignItems:"center", padding:"8px 0 14px", zIndex:50 }}>
            {navItems.map(nav => {
              const active = screen === nav.s;
              return (
                <button key={nav.s} onClick={() => go(nav.s)} style={{ background:"none", border:"none", cursor:"pointer", display:"flex", flexDirection:"column", alignItems:"center", gap:3, padding:"2px 10px" }}>
                  <div style={{ filter: active ? `drop-shadow(0 0 8px ${t.primary})` : "none", transition:"filter 0.2s" }}>
                    <NeonIcon type={nav.icon} color={active ? t.primary : "#666688"} size={24}/>
                  </div>
                  <span style={{ fontSize:11, fontWeight: active ? 700 : 400, color: active ? t.primary : "#666688", textShadow: active ? `0 0 6px ${t.primary}` : "none" }}>{nav.label}</span>
                </button>
              );
            })}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
